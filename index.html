<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OverLAN</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #fff;
                color: #000;
                padding: 2rem;
                width: 100%;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* Header */
            .topbar {
                display: flex;
                align-items: center;
                border-bottom: 2px solid #000;
                padding-bottom: 1rem;
                margin-bottom: 2rem;
                gap: 1.5rem;
            }
            .topbar h1 {
                font-size: 1.5rem;
                text-transform: uppercase;
                letter-spacing: 2px;
                flex-grow: 1;
            }

            .nav-actions {
                display: flex;
                gap: 1rem;
            }
            
            .nav-btn {
                padding: 0;
                background: #fff;
                color: #000;
                border: 2px solid #000;
                font-weight: 700;
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 1px;
                white-space: nowrap;
                display: flex;
                align-items: stretch;
                height: 40px; 
            }
            .nav-btn:hover {
                background: #000;
                color: #fff;
            }
            .nav-btn .btn-label {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0 1rem;
                flex-grow: 1;
            }
            .nav-btn .btn-icon {
                display: none; 
                align-items: center;
                justify-content: center;
                width: 40px;
                min-width: 40px;
                border-left: 2px solid #000;
            }
            .nav-btn:hover .btn-icon {
                border-left-color: #fff;
            }
            .nav-btn svg {
                display: block;
            }

            #btn-history {
                width: 120px;
            }

            /* View Containers */
            #main-view {
                display: flex;
                flex-direction: column;
                width: 100%;
                flex-grow: 1;
            }
            #history-view {
                display: none;
                flex-direction: column;
                width: 100%;
                flex-grow: 1;
            }

            /* Empty States */
            .empty-state-text {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.25rem;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: #888;
            }

            /* Queue & Single-Line Cards */
            #queue {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }
            .card {
                display: flex;
                align-items: center;
                border: 2px solid #000;
                padding: 0.75rem 1rem;
                gap: 1.5rem;
                width: 100%;
            }
            .file-name {
                font-weight: 700;
                font-size: 1rem;
                flex-grow: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .file-size {
                font-family: monospace;
                font-size: 1rem;
                white-space: nowrap;
                width: 80px;
                text-align: right;
            }

            /* Actions */
            .actions {
                display: flex;
                gap: 0.5rem;
            }
            .actions button {
                padding: 0;
                background: #fff;
                color: #000;
                border: 2px solid #000;
                font-weight: 700;
                cursor: pointer;
                text-transform: uppercase;
                white-space: nowrap;
                display: flex;
                align-items: stretch;
                height: 40px;
            }
            .actions button:hover {
                background: #000;
                color: #fff;
            }
            .actions button .btn-label {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0 1rem;
                flex-grow: 1;
            }
            .actions button .btn-icon {
                display: none; 
                align-items: center;
                justify-content: center;
                min-width: 40px;
                width: 40px;
                border-left: 2px solid #000;
            }
            .actions button:hover .btn-icon {
                border-left-color: #fff;
            }
            .actions button svg {
                display: block;
            }

            /* Inline Progress */
            .progress-wrapper {
                display: flex;
                align-items: center;
                gap: 1.5rem;
                flex-grow: 2;
                font-family: monospace;
                font-size: 1rem;
            }
            .stats {
                display: flex;
                gap: 1rem;
                white-space: nowrap;
                min-width: 130px;
            }
            .progress-track {
                flex-grow: 1;
                height: 10px;
                background: #fff;
                border: 1px solid #000;
                position: relative;
                min-width: 100px;
            }
            .progress-fill {
                height: 100%;
                background: #000;
                width: 0%;
                position: absolute;
                top: 0;
                left: 0;
            }
            .status-text {
                text-transform: uppercase;
                white-space: nowrap;
                width: 180px;
                text-align: right;
            }

            /* History Table Styles */
            #history-table {
                display: none;
                width: 100%;
                font-family: monospace;
                font-size: 1rem;
            }
            .history-header,
            .history-item {
                display: flex;
                padding: 0.75rem 1rem;
                gap: 1.5rem;
                width: 100%;
            }
            .history-header {
                font-weight: 700;
                text-transform: uppercase;
                border: 3px solid #000;
            }
            .history-header > div {
                font-size: 1rem;
                font-weight: 700;
            }
            .history-item {
                border-bottom: 2px solid #000;
                border-left: 3px solid transparent;
                border-right: 3px solid transparent;
            }
            .history-header .time,
            .history-item .time {
                width: 100px;
            }
            .history-header .name,
            .history-item .name {
                flex-grow: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .history-header .status,
            .history-item .status {
                width: 120px;
                text-align: right;
                text-transform: uppercase;
            }

            /* ── Mobile responsive ── */
            @media (max-width: 600px) {
                body { padding: 1rem; }
                .topbar { gap: 0.75rem; margin-bottom: 1.25rem; }
                .topbar h1 { font-size: 1.1rem; letter-spacing: 1px; }
                .nav-actions { gap: 0.5rem; }
                
                .nav-btn, #btn-history {
                    width: 42px !important;
                    height: 42px !important;
                }
                .nav-btn .btn-label { display: none; }
                .nav-btn .btn-icon {
                    display: flex; 
                    border-left: none;
                    width: 100%;
                    min-width: unset;
                }

                .card {
                    flex-wrap: wrap;
                    gap: 0.5rem;
                    padding: 0.65rem 0.75rem;
                }
                .file-name {
                    flex-basis: calc(100% - 90px); 
                    font-size: 0.9rem;
                }
                .file-size {
                    font-size: 0.85rem;
                    width: auto;
                    min-width: 60px;
                }
                .actions {
                    width: 100%;
                    justify-content: flex-end;
                }
                
                .actions button {
                    width: 42px !important;
                    height: 42px !important;
                }
                .actions button .btn-label { display: none; }
                .actions button .btn-icon {
                    display: flex; 
                    border-left: none;
                    width: 100%;
                    min-width: unset;
                }

                .progress-wrapper {
                    flex-wrap: wrap;
                    gap: 0.4rem;
                    width: 100%;
                }
                .stats {
                    min-width: unset;
                    gap: 0.75rem;
                }
                .progress-track {
                    width: 100%;
                    min-width: unset;
                    flex-basis: 100%;
                    order: 3;
                }
                .status-text {
                    width: auto;
                    text-align: left;
                    font-size: 0.8rem;
                }

                .history-header .time, .history-item .time { width: 60px; font-size: 0.8rem; }
                .history-header .status, .history-item .status { width: 70px; font-size: 0.8rem; }
                .history-header, .history-item { gap: 0.75rem; padding: 0.6rem 0.75rem; }
                #history-table { font-size: 0.85rem; }
                .empty-state-text { font-size: 1rem; letter-spacing: 1px; }
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <h1>OVERLAN</h1>
            <div class="nav-actions">
                <button class="nav-btn" id="btn-history" onclick="toggleHistory()">
                    <span class="btn-label">HISTORY</span>
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                    </span>
                </button>
                <input type="file" id="fileInput" style="display: none" onchange="queueUpload(this.files[0])"/>
                <button class="nav-btn" onclick="document.getElementById('fileInput').click()">
                    <span class="btn-label">SHARE FILE</span>
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13"/><path d="m16 6-4-4-4 4"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>
                    </span>
                </button>
            </div>
        </div>

        <div id="main-view">
            <div id="empty-queue-state" class="empty-state-text">WAITING FOR FILES...</div>
            <div id="queue"></div>
        </div>

        <div id="history-view">
            <div id="empty-history-state" class="empty-state-text">HISTORY IS EMPTY</div>
            <div id="history-table">
                <div class="history-header">
                    <div class="time">TIME</div>
                    <div class="name">FILE NAME</div>
                    <div class="status">STATUS</div>
                </div>
                <div id="history-list"></div>
            </div>
        </div>

        <script>
            const es = new EventSource("/events");
            
            const pendingUploads = new Map();

            let isHistoryView = false;
            const historyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`;
            const queueIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5H3"/><path d="M16 12H3"/><path d="M9 19H3"/><path d="m16 16-3 3 3 3"/><path d="M21 5v12a2 2 0 0 1-2 2h-6"/></svg>`;

            function toggleHistory() {
                isHistoryView = !isHistoryView;
                const main = document.getElementById("main-view");
                const hist = document.getElementById("history-view");
                const btn = document.getElementById("btn-history");

                if (isHistoryView) {
                    main.style.display = "none";
                    hist.style.display = "flex";
                    btn.innerHTML = `<span class="btn-label">QUEUE</span><span class="btn-icon">${queueIcon}</span>`;
                } else {
                    main.style.display = "flex";
                    hist.style.display = "none";
                    btn.innerHTML = `<span class="btn-label">HISTORY</span><span class="btn-icon">${historyIcon}</span>`;
                }
            }

            function checkEmptyQueue() {
                const queueHasItems = document.getElementById("queue").children.length > 0;
                if (queueHasItems) {
                    document.getElementById("empty-queue-state").style.display = "none";
                } else {
                    document.getElementById("empty-queue-state").style.display = "flex";
                }
            }

            // --- INCOMING DOWNLOAD LOGIC ---
            es.addEventListener("file", (e) => {
                const f = JSON.parse(e.data);
                if (document.getElementById(`card-${f.id}`)) return;

                const html = `
                    <div class="card" id="card-${f.id}">
                        <div class="file-name" title="${f.name}">${f.name}</div>
                        <div class="file-size">${formatSize(f.size)}</div>
                        <div class="actions">
                            <button onclick="reject('${f.id}')"><span class="btn-label">REJECT</span><span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></button>
                            <button onclick="accept('${f.id}')"><span class="btn-label">ACCEPT</span><span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span></button>
                        </div>
                    </div>`;
                document.getElementById("queue").insertAdjacentHTML("beforeend", html);
                checkEmptyQueue();
            });

            function accept(id) {
                const card = document.getElementById(`card-${id}`);
                const name = card.querySelector(".file-name").textContent.trim();

                card.innerHTML = `
                    <div class="file-name" title="${name}">${name}</div>
                    <div class="status-text" style="flex-grow: 1; text-align: right; color: #888;">HANDED TO BROWSER</div>
                `;

                const a = document.createElement("a");
                a.href = `/download?id=${id}`;
                a.target = "_blank"; 
                a.download = name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                setTimeout(() => removeCard(id), 2500);
            }

            function reject(id) {
                fetch(`/reject?id=${id}`);
                removeCard(id);
            }

            // --- OUTGOING UPLOAD LOGIC ---
            function queueUpload(file) {
                if (!file) return;

                const tempId = "up-" + Math.random().toString(36).substring(2);
                pendingUploads.set(tempId, file);

                const html = `
                    <div class="card" id="card-${tempId}">
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-size">${formatSize(file.size)}</div>
                        <div class="actions">
                            <button onclick="cancelUpload('${tempId}')"><span class="btn-label">CANCEL</span><span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></span></button>
                            <button onclick="confirmUpload('${tempId}')"><span class="btn-label">SEND</span><span class="btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></span></button>
                        </div>
                    </div>`;
                document.getElementById("queue").insertAdjacentHTML("afterbegin", html);
                checkEmptyQueue();

                document.getElementById('fileInput').value = ""; 
            }

            function cancelUpload(id) {
                pendingUploads.delete(id);
                removeCard(id);
            }

            function confirmUpload(id) {
                const file = pendingUploads.get(id);
                if (!file) return;
                
                pendingUploads.delete(id); 

                const card = document.getElementById(`card-${id}`);
                card.innerHTML = `
                    <div class="file-name" title="${file.name}">${file.name}</div>
                    <div class="progress-wrapper">
                        <div class="stats"><span id="pct-${id}">0%</span></div>
                        <div class="progress-track"><div class="progress-fill" id="bar-${id}"></div></div>
                        <div class="status-text" id="status-${id}">UPLOADING...</div>
                    </div>
                `;

                const xhr = new XMLHttpRequest();
                xhr.open("POST", "/upload", true);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        document.getElementById(`bar-${id}`).style.width = pct + "%";
                        document.getElementById(`pct-${id}`).textContent = pct + "%";
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        document.getElementById(`status-${id}`).textContent = "SENT SUCCESSFULLY";
                        setTimeout(() => removeCard(id), 2000);
                    } else {
                        document.getElementById(`status-${id}`).textContent = "UPLOAD FAILED";
                        setTimeout(() => removeCard(id), 4000);
                    }
                };

                const formData = new FormData();
                formData.append("file", file);
                xhr.send(formData);
            }

            function removeCard(id) {
                const card = document.getElementById(`card-${id}`);
                if (card) {
                    card.remove();
                    checkEmptyQueue();
                }
            }

            // --- HISTORY LOGIC ---
            function checkEmptyHistory() {
                const list = document.getElementById("history-list");
                const emptyState = document.getElementById("empty-history-state");
                const table = document.getElementById("history-table");

                if (list.children.length === 0) {
                    emptyState.style.display = "flex";
                    table.style.display = "none";
                } else {
                    emptyState.style.display = "none";
                    table.style.display = "block";
                }
            }

            function createHistoryRow(item) {
                return `
                    <div class="history-item">
                        <div class="time">${item.time}</div>
                        <div class="name" title="${item.name}">${item.name}</div>
                        <div class="status">${item.status}</div>
                    </div>
                `;
            }

            es.addEventListener("history_sync", (e) => {
                const items = JSON.parse(e.data);
                const list = document.getElementById("history-list");
                list.innerHTML = items.map(createHistoryRow).join("");
                checkEmptyHistory();
            });

            es.addEventListener("history_add", (e) => {
                const item = JSON.parse(e.data);
                const list = document.getElementById("history-list");
                list.insertAdjacentHTML("afterbegin", createHistoryRow(item));
                checkEmptyHistory();
            });

            function formatSize(bytes) {
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
                return (bytes / 1048576).toFixed(1) + " MB";
            }
        </script>
    </body>
</html>
