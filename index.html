<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OverLAN</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: #fff;
                color: #000;
                padding: 2rem;
                width: 100%;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* Header */
            .topbar {
                display: flex;
                align-items: center;
                border-bottom: 2px solid #000;
                padding-bottom: 1rem;
                margin-bottom: 2rem;
                gap: 1.5rem;
            }
            .topbar h1 {
                font-size: 1.5rem;
                text-transform: uppercase;
                letter-spacing: 2px;
                flex-grow: 1;
            }

            .nav-actions {
                display: flex;
                gap: 1rem;
            }
            .nav-btn {
                padding: 0.5rem 0.75rem;
                background: #fff;
                color: #000;
                border: 2px solid #000;
                font-weight: 700;
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 1px;
                white-space: nowrap;
                display: flex;
                align-items: center;
                gap: 0.25rem;
            }
            .nav-btn:hover {
                background: #000;
                color: #fff;
            }
            .nav-btn svg {
                display: block;
            }

            /* Fixes the jitter when swapping between History/Queue */
            #btn-history {
                width: 145px;
                justify-content: center;
            }

            /* View Containers */
            #main-view {
                display: flex;
                flex-direction: column;
                width: 100%;
                flex-grow: 1;
            }
            #history-view {
                display: none;
                flex-direction: column;
                width: 100%;
                flex-grow: 1;
            }

            /* Empty States */
            .empty-state-text {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.25rem;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: #888;
            }

            /* Queue & Single-Line Cards */
            #queue {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }
            .card {
                display: flex;
                align-items: center;
                border: 2px solid #000;
                padding: 0.75rem 1rem;
                gap: 1.5rem;
                width: 100%;
            }
            .file-name {
                font-weight: 700;
                font-size: 1rem;
                flex-grow: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .file-size {
                font-family: monospace;
                font-size: 1rem;
                white-space: nowrap;
                width: 80px;
                text-align: right;
            }

            /* Actions */
            .actions {
                display: flex;
                gap: 0.5rem;
            }
            .actions button {
                padding: 0.5rem 1rem;
                background: #fff;
                color: #000;
                border: 2px solid #000;
                font-weight: 700;
                cursor: pointer;
                text-transform: uppercase;
                white-space: nowrap;
            }
            .actions button:hover {
                background: #000;
                color: #fff;
            }

            /* Inline Progress */
            .progress-wrapper {
                display: flex;
                align-items: center;
                gap: 1.5rem;
                flex-grow: 2;
                font-family: monospace;
                font-size: 1rem;
            }
            .stats {
                display: flex;
                gap: 1rem;
                white-space: nowrap;
                min-width: 130px;
            }
            .progress-track {
                flex-grow: 1;
                height: 10px;
                background: #fff;
                border: 1px solid #000;
                position: relative;
                min-width: 100px;
            }
            .progress-fill {
                height: 100%;
                background: #000;
                width: 0%;
                position: absolute;
                top: 0;
                left: 0;
            }
            .status-text {
                text-transform: uppercase;
                white-space: nowrap;
                width: 180px;
                text-align: right;
            }

            /* History Table Styles */
            #history-table {
                display: none;
                width: 100%;
                font-family: monospace;
                font-size: 1rem;
            }
            .history-header,
            .history-item {
                display: flex;
                padding: 0.75rem 1rem;
                gap: 1.5rem;
                width: 100%;
            }

            .history-header {
                font-weight: 700;
                text-transform: uppercase;
                border: 3px solid #000;
            }

            .history-header > div {
                font-size: 1rem;
                font-weight: 700;
            }

            .history-item {
                border-bottom: 2px solid #000;
                border-left: 3px solid transparent;
                border-right: 3px solid transparent;
            }

            .history-header .time,
            .history-item .time {
                width: 100px;
            }
            .history-header .name,
            .history-item .name {
                flex-grow: 1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .history-header .status,
            .history-item .status {
                width: 120px;
                text-align: right;
                text-transform: uppercase;
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <h1>OVERLAN</h1>
            <div class="nav-actions">
                <button
                    class="nav-btn"
                    id="btn-history"
                    onclick="toggleHistory()"
                >
                    HISTORY
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"
                        />
                        <path d="M3 3v5h5" />
                        <path d="M12 7v5l4 2" />
                    </svg>
                </button>
                <input
                    type="file"
                    id="fileInput"
                    style="display: none"
                    onchange="uploadFile(this.files[0])"
                />
                <button
                    class="nav-btn"
                    onclick="document.getElementById('fileInput').click()"
                >
                    SHARE FILE
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path d="M12 2v13" />
                        <path d="m16 6-4-4-4 4" />
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="main-view">
            <div id="empty-queue-state" class="empty-state-text">
                WAITING FOR FILES...
            </div>
            <div id="queue"></div>
        </div>

        <div id="history-view">
            <div id="empty-history-state" class="empty-state-text">
                HISTORY IS EMPTY
            </div>
            <div id="history-table">
                <div class="history-header">
                    <div class="time">TIME</div>
                    <div class="name">FILE NAME</div>
                    <div class="status">STATUS</div>
                </div>
                <div id="history-list"></div>
            </div>
        </div>

        <script>
            const es = new EventSource("/events");

            // --- VIEW TOGGLING & SVG SWAPPING ---
            let isHistoryView = false;

            const historyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`;
            const queueIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5H3"/><path d="M16 12H3"/><path d="M9 19H3"/><path d="m16 16-3 3 3 3"/><path d="M21 5v12a2 2 0 0 1-2 2h-6"/></svg>`;

            function toggleHistory() {
                isHistoryView = !isHistoryView;
                const main = document.getElementById("main-view");
                const hist = document.getElementById("history-view");
                const btn = document.getElementById("btn-history");

                if (isHistoryView) {
                    main.style.display = "none";
                    hist.style.display = "flex";
                    btn.innerHTML = "QUEUE " + queueIcon;
                } else {
                    main.style.display = "flex";
                    hist.style.display = "none";
                    btn.innerHTML = "HISTORY " + historyIcon;
                }
            }

            // --- QUEUE LOGIC ---
            function checkEmptyQueue() {
                const queueHasItems =
                    document.getElementById("queue").children.length > 0;
                if (queueHasItems) {
                    document.getElementById("empty-queue-state").style.display =
                        "none";
                } else {
                    document.getElementById("empty-queue-state").style.display =
                        "flex";
                }
            }

            es.addEventListener("file", (e) => {
                const f = JSON.parse(e.data);
                if (document.getElementById(`card-${f.id}`)) return;

                const html = `
                    <div class="card" id="card-${f.id}">
                        <div class="file-name" title="${f.name}">${f.name}</div>
                        <div class="file-size">${formatSize(f.size)}</div>
                        <div class="actions">
                            <button onclick="reject('${f.id}')">REJECT</button>
                            <button onclick="accept('${f.id}')">ACCEPT</button>
                        </div>
                    </div>`;
                document
                    .getElementById("queue")
                    .insertAdjacentHTML("beforeend", html);
                checkEmptyQueue();
            });

            function accept(id) {
                const card = document.getElementById(`card-${id}`);
                const name = card.querySelector(".file-name").textContent;

                card.innerHTML = `
                    <div class="file-name" title="${name}">${name}</div>
                    <div class="progress-wrapper">
                        <div class="stats"><span id="pct-${id}">0%</span> <span id="spd-${id}"></span></div>
                        <div class="progress-track"><div class="progress-fill" id="bar-${id}"></div></div>
                        <div class="status-text" id="status-${id}">DOWNLOADING...</div>
                    </div>
                `;

                const a = document.createElement("a");
                a.href = `/download?id=${id}`;
                a.download = "";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            function reject(id) {
                fetch(`/reject?id=${id}`);
                removeCard(id);
            }

            function removeCard(id) {
                const card = document.getElementById(`card-${id}`);
                if (card) {
                    card.remove();
                    checkEmptyQueue();
                }
            }

            es.addEventListener("progress", (e) => {
                const p = JSON.parse(e.data);
                const bar = document.getElementById(`bar-${p.id}`);
                if (!bar) return;

                const pct = Math.round((p.sent / p.total) * 100);
                bar.style.width = pct + "%";
                document.getElementById(`pct-${p.id}`).textContent = pct + "%";
                document.getElementById(`spd-${p.id}`).textContent =
                    formatSize(p.speed) + "/s";

                if (pct >= 100) {
                    document.getElementById(`status-${p.id}`).textContent =
                        "SAVED TO DOWNLOADS";
                    setTimeout(() => removeCard(p.id), 2500);
                }
            });

            function uploadFile(file) {
                if (!file) return;

                const tempId = "up-" + Math.random().toString(36).substring(2);

                const html = `
                    <div class="card" id="card-${tempId}">
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="progress-wrapper">
                            <div class="stats"><span id="pct-${tempId}">0%</span></div>
                            <div class="progress-track"><div class="progress-fill" id="bar-${tempId}"></div></div>
                            <div class="status-text" id="status-${tempId}">UPLOADING...</div>
                        </div>
                    </div>`;
                document
                    .getElementById("queue")
                    .insertAdjacentHTML("afterbegin", html);
                checkEmptyQueue();

                const xhr = new XMLHttpRequest();
                xhr.open("POST", "/upload", true);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        document.getElementById(`bar-${tempId}`).style.width =
                            pct + "%";
                        document.getElementById(`pct-${tempId}`).textContent =
                            pct + "%";
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        document.getElementById(
                            `status-${tempId}`,
                        ).textContent = "SENT SUCCESSFULLY";
                        setTimeout(() => removeCard(tempId), 2000);
                    } else {
                        document.getElementById(
                            `status-${tempId}`,
                        ).textContent = "UPLOAD FAILED";
                        setTimeout(() => removeCard(tempId), 4000);
                    }
                };

                const formData = new FormData();
                formData.append("file", file);
                xhr.send(formData);
            }

            // --- HISTORY LOGIC ---
            function checkEmptyHistory() {
                const list = document.getElementById("history-list");
                const emptyState = document.getElementById(
                    "empty-history-state",
                );
                const table = document.getElementById("history-table");

                if (list.children.length === 0) {
                    emptyState.style.display = "flex";
                    table.style.display = "none";
                } else {
                    emptyState.style.display = "none";
                    table.style.display = "block";
                }
            }

            function createHistoryRow(item) {
                return `
                    <div class="history-item">
                        <div class="time">${item.time}</div>
                        <div class="name" title="${item.name}">${item.name}</div>
                        <div class="status">${item.status}</div>
                    </div>
                `;
            }

            es.addEventListener("history_sync", (e) => {
                const items = JSON.parse(e.data);
                const list = document.getElementById("history-list");
                list.innerHTML = items.map(createHistoryRow).join("");
                checkEmptyHistory();
            });

            es.addEventListener("history_add", (e) => {
                const item = JSON.parse(e.data);
                const list = document.getElementById("history-list");
                list.insertAdjacentHTML("afterbegin", createHistoryRow(item));
                checkEmptyHistory();
            });

            // --- UTILITIES ---
            function formatSize(bytes) {
                if (bytes < 1024) return bytes + " B";
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
                return (bytes / 1048576).toFixed(1) + " MB";
            }
        </script>
    </body>
</html>
